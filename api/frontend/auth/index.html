<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Authentication — AmberScript</title>
</head>

<body>
    <div class="toast-container"></div>
    <main>
        <div class="form">
            <div class="auth-container">
                <div class="signin authentication">
                    <form data-url="signin">
                        <img src="../assets/images/logo/logo-t.png" alt="AmberScript logo" width="50%"
                            onclick="window.location.href='/'">
                        <div class="form-group">
                            <label for="email">Email*</label>
                            <input type="email" name="email" id="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password*</label>
                            <input type="password" name="password" id="password">
                        </div>
                        <div class="error"></div>
                        <div class="form-group">
                            <button type="submit" data-url="signin" id="signin-btn">Sign in</button>
                        </div>
                        <div class="form-group">
                            <input type="checkbox" id="sign-up" name="choice" hidden>
                            <p>New to AmberScript? <label for="sign-up">sign up</label></p>
                        </div>
                    </form>
                </div>
                <div class="signup authentication">
                    <form data-url="signup">
                        <img src="../assets/images/logo/logo-t.png" alt="AmberScript logo" width="50%"
                            onclick="window.location.href='/'">
                        <div class="form-group">
                            <label for="username">Username*</label>
                            <input type="text" name="username" id="username">
                        </div>
                        <div class="form-group">
                            <label for="email">Email*</label>
                            <input type="email" name="email" id="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password*</label>
                            <input type="password" name="password" id="password">
                        </div>

                        <div class="error"></div>
                        <div class="form-group">
                            <button type="submit" id="signup-btn">Sign up</button>
                        </div>
                        <div class="form-group">
                            <input type="checkbox" id="sign-in" name="choice" hidden>
                            <p>Already have an account? <label for="sign-in">sign in</label></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="auth.js"></script>
</body>

</html>
