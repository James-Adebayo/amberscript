<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
    <title>Authentication — AmberScript</title>
</head>
<body>
    <main>
        <form>
           <div class="auth-container">
                <div class="signin authentication">
                    <img src="../assets/images/logo/logo-t.png" alt="AmberScript logo" width="50%" onclick="window.location.href='/'">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div class="form-group">
                        <button type="submit" data-url = "signin" id="submit">Sign in</button>
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="sign-up" name="choice" hidden>
                        <p>New to AmberScript? <label for="sign-up">sign up</label></p>
                    </div>
                </div>
                <div class="signup authentication">
                    <img src="../assets/images/logo/logo-t.png" alt="AmberScript logo"  width="50%" onclick="window.location.href='/'">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div class="form-group">
                        <label for="cpassword">confirm Password*</label>
                        <input type="cpassword" name="cpassword" id="cpassword">
                    </div>
                    <div class="form-group">
                        <button type="submit" data-url = "signup" id="submit">Sign up</button>
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="sign-in" name="choice" hidden>
                        <p>Already have an account? <label for="sign-in">sign in</label></p>
                    </div>
                </div>
           </div>
        </form>
    </main>
    <script>
        const form = document.querySelector('form');
        const submitBtn = document.querySelectorAll('#submit');
        const a = document.getElementById('sign-up');
        const b = document.getElementById('sign-in');

        a.addEventListener('change', () => {
            if(a.checked) b.checked = false;
        });

        b.addEventListener("change", () => {
            if(b.checked) a.checked = false;
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
        });

        submitBtn.forEach(button => {
            button.addEventListener("click", () => {
                console.log(button.dataset.url);
            });
        });
        
    </script>
</body>
</html>
